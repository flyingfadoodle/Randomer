<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Randomer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f5f0; --surface: #ffffff;
      --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.2);
      --text: #1a1a18; --muted: #6b6b67;
      --info-bg: #eef4ff; --info-border: rgba(24,95,165,0.3); --info-text: #185fa5;
      --radius-md: 8px; --radius-lg: 14px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { border-bottom: 0.5px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: baseline; gap: 1rem; }
    header h1 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; letter-spacing: -0.01em; }
    header span { font-size: 13px; color: var(--muted); }
    .main { max-width: 720px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
    .section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; }
    .sources-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
    .source-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 0.875rem 1rem; cursor: pointer; transition: border-color 0.15s, background 0.15s; position: relative; user-select: none; }
    .source-card:hover { border-color: var(--border-strong); }
    .source-card.selected { border: 1.5px solid var(--info-border); background: var(--info-bg); }
    .source-card .check { position: absolute; top: 10px; right: 10px; width: 18px; height: 18px; border-radius: 50%; border: 0.5px solid var(--border-strong); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--info-text); }
    .source-card.selected .check { background: var(--info-bg); border-color: var(--info-border); }
    .source-card .name { font-size: 13px; font-weight: 500; margin-bottom: 3px; padding-right: 24px; }
    .source-card .desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
    .shuffle-row { margin-bottom: 2rem; }
    .btn-shuffle { width: 100%; padding: 11px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; border-radius: var(--radius-md); border: 0.5px solid var(--border-strong); background: var(--surface); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; }
    .btn-shuffle:hover { background: #eeece7; }
    .btn-shuffle:active { transform: scale(0.99); }
    .btn-shuffle:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-shuffle svg { transition: transform 0.5s ease; }
    .btn-shuffle.spinning svg { transform: rotate(360deg); }
    .results { display: flex; flex-direction: column; gap: 10px; }
    .result-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; animation: fadein 0.18s ease; }
    @keyframes fadein { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .result-info { flex: 1; min-width: 0; }
    .result-source { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 3px; }
    .result-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .result-date { font-size: 12px; color: var(--muted); }
    .btn-open { padding: 7px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; border-radius: var(--radius-md); border: 0.5px solid var(--border-strong); background: transparent; color: var(--text); cursor: pointer; white-space: nowrap; flex-shrink: 0; display: flex; align-items: center; gap: 6px; text-decoration: none; transition: background 0.15s; }
    .btn-open:hover { background: #eeece7; }
    .state-box { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: 14px; border: 0.5px dashed var(--border-strong); border-radius: var(--radius-lg); }
    .divider { border: none; border-top: 0.5px solid var(--border); margin: 2.5rem 0; }
    @media (max-width: 520px) { .sources-grid { grid-template-columns: 1fr; } header { padding: 1rem; } .main { padding: 1.5rem 1rem 3rem; } }
  </style>
</head>
<body>
<header>
  <h1>Randomer</h1>
  <span>Find something worth reading</span>
</header>
<main class="main">
  <p class="section-label">News</p>
  <div class="sources-grid" id="sources"></div>
  <div class="shuffle-row">
    <button class="btn-shuffle" id="shuffleBtn" onclick="shuffle()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line>
        <polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line>
      </svg>
      Shuffle picks
    </button>
  </div>
  <div class="results" id="results">
    <div class="state-box">Select sources above and hit shuffle</div>
  </div>
  <hr class="divider" />
  <p class="section-label" style="color: var(--border-strong);">More categories coming soon</p>
</main>
<script>
const SOURCES = [
  { id: "wsj",       name: "Wall Street Journal", desc: "Markets, business, finance" },
  { id: "bloomberg", name: "Bloomberg",            desc: "Finance, global markets, politics" },
];

let selected = new Set(["wsj", "bloomberg"]);
let articlesData = null;

function renderSources() {
  document.getElementById("sources").innerHTML = SOURCES.map(s => `
    <div class="source-card ${selected.has(s.id) ? 'selected' : ''}"
         onclick="toggle('${s.id}')" role="checkbox" aria-checked="${selected.has(s.id)}" tabindex="0"
         onkeydown="if(event.key==='Enter'||event.key===' ')toggle('${s.id}')">
      <div class="check">${selected.has(s.id) ? '✓' : ''}</div>
      <p class="name">${s.name}</p>
      <p class="desc">${s.desc}</p>
    </div>
  `).join("");
}

function toggle(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  renderSources();
}

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function formatDate(str) {
  if (!str) return "";
  const d = new Date(str);
  if (isNaN(d)) return "";
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

async function loadArticles() {
  if (articlesData) return articlesData;
  const res = await fetch("articles.json?t=" + Date.now());
  articlesData = await res.json();
  return articlesData;
}

async function shuffle() {
  const pool = SOURCES.filter(s => selected.has(s.id));
  if (!pool.length) {
    document.getElementById("results").innerHTML = '<div class="state-box">Select at least one source first.</div>';
    return;
  }
  const btn = document.getElementById("shuffleBtn");
  btn.disabled = true;
  btn.classList.add("spinning");
  document.getElementById("results").innerHTML = '<div class="state-box">Picking articles\u2026</div>';
  try {
    const data = await loadArticles();
    const picks = [];
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    for (const src of shuffled) {
      if (picks.length >= 3) break;
      const articles = data[src.id]?.articles || [];
      if (articles.length) picks.push({ src, article: pickRandom(articles) });
    }
    while (picks.length < 3) {
      const src = pickRandom(pool);
      const articles = data[src.id]?.articles || [];
      if (articles.length) picks.push({ src, article: pickRandom(articles) });
      else break;
    }
    if (!picks.length) {
      document.getElementById("results").innerHTML = '<div class="state-box">No articles found. Try again shortly.</div>';
      return;
    }
    document.getElementById("results").innerHTML = picks.map(({ src, article }) => `
      <div class="result-card">
        <div class="result-info">
          <p class="result-source">${src.name}</p>
          <p class="result-title">${article.title}</p>
          ${article.date ? `<p class="result-date">${formatDate(article.date)}</p>` : ""}
        </div>
        <a class="btn-open" href="${article.url}" target="_blank" rel="noopener">
          Open
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
            <polyline points="15 3 21 3 21 9"></polyline>
            <line x1="10" y1="14" x2="21" y2="3"></line>
          </svg>
        </a>
      </div>
    `).join("");
  } catch (e) {
    document.getElementById("results").innerHTML = '<div class="state-box">Couldn\'t load articles. Try again shortly.</div>';
  }
  btn.disabled = false;
  setTimeout(() => btn.classList.remove("spinning"), 500);
}

renderSources();
</script>
</body>
</html>
