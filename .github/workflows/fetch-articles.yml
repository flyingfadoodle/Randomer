name: Fetch Articles

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch RSS feeds and merge with existing articles.json
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          import json
          import os
          from datetime import datetime, timezone, timedelta

          KEEP_DAYS = 21

          # Each feed has a "topics" list — articles from that feed get those tags
          FEEDS = [
            {"source": "Wall Street Journal", "id": "wsj", "feeds": [
              {"label": "Business",   "url": "https://feeds.content.dowjones.io/public/rss/WSJcomUSBusiness", "topics": ["Business"]},
              {"label": "World News", "url": "https://feeds.content.dowjones.io/public/rss/RSSWorldNews",     "topics": ["World"]},
              {"label": "Opinion",    "url": "https://feeds.content.dowjones.io/public/rss/RSSOpinion",       "topics": []},
              {"label": "Tech",       "url": "https://feeds.content.dowjones.io/public/rss/RSSWSJD",          "topics": ["Technology"]},
              {"label": "Markets",    "url": "https://feeds.content.dowjones.io/public/rss/mw_realtimeheadlines", "topics": ["Markets", "Finance"]},
              {"label": "Lifestyle",  "url": "https://feeds.content.dowjones.io/public/rss/RSSLifestyle",     "topics": []},
            ]},
            {"source": "Bloomberg", "id": "bloomberg", "feeds": [
              {"label": "Markets",    "url": "https://feeds.bloomberg.com/markets/news.rss",    "topics": ["Markets", "Finance"]},
              {"label": "Technology", "url": "https://feeds.bloomberg.com/technology/news.rss", "topics": ["Technology"]},
              {"label": "Politics",   "url": "https://feeds.bloomberg.com/politics/news.rss",   "topics": ["Politics"]},
              {"label": "Business",   "url": "https://feeds.bloomberg.com/business/news.rss",   "topics": ["Business"]},
              {"label": "Wealth",     "url": "https://feeds.bloomberg.com/wealth/news.rss",     "topics": ["Finance"]},
            ]},
            {"source": "Yahoo Finance", "id": "yahoo", "feeds": [
              {"label": "Top Stories", "url": "https://finance.yahoo.com/news/rssindex",                                          "topics": ["Finance", "Markets"]},
              {"label": "Markets",     "url": "https://finance.yahoo.com/rss/2.0/headline?s=^GSPC&region=US&lang=en-US",          "topics": ["Markets", "Finance"]},
              {"label": "Technology",  "url": "https://finance.yahoo.com/news/rssindex?category=technology",                      "topics": ["Technology"]},
            ]},
            {"source": "CNN", "id": "cnn", "feeds": [
              {"label": "Top Stories", "url": "http://rss.cnn.com/rss/edition.rss",                     "topics": []},
              {"label": "World",       "url": "http://rss.cnn.com/rss/edition_world.rss",               "topics": ["World"]},
              {"label": "US",          "url": "http://rss.cnn.com/rss/edition_us.rss",                  "topics": []},
              {"label": "Business",    "url": "http://rss.cnn.com/rss/money_news_international.rss",    "topics": ["Business", "Finance"]},
              {"label": "Technology",  "url": "http://rss.cnn.com/rss/edition_technology.rss",          "topics": ["Technology"]},
              {"label": "Politics",    "url": "http://rss.cnn.com/rss/edition_politics.rss",            "topics": ["Politics"]},
            ]},
          ]

          def fetch_feed(url):
            req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
            with urllib.request.urlopen(req, timeout=15) as r:
              content = r.read()
            root = ET.fromstring(content)
            articles = []
            for item in root.findall(".//item"):
              title = item.findtext("title", "").strip()
              link = item.findtext("link", "").strip()
              pub_date = item.findtext("pubDate", "").strip()
              if title and link:
                articles.append({"title": title, "url": link, "date": pub_date})
            return articles

          def parse_date(date_str):
            if not date_str:
              return None
            for fmt in ["%a, %d %b %Y %H:%M:%S %z", "%a, %d %b %Y %H:%M:%S GMT"]:
              try:
                return datetime.strptime(date_str, fmt).replace(tzinfo=timezone.utc)
              except:
                pass
            return None

          existing = {}
          if os.path.exists("articles.json"):
            with open("articles.json") as f:
              existing = json.load(f)

          cutoff = datetime.now(timezone.utc) - timedelta(days=KEEP_DAYS)
          output = {}

          for source in FEEDS:
            sid = source["id"]
            # Preserve existing articles by URL
            seen = {a["url"]: a for a in existing.get(sid, {}).get("articles", [])}

            for feed in source["feeds"]:
              try:
                new_articles = fetch_feed(feed["url"])
                for a in new_articles:
                  # Merge topics if article already exists
                  if a["url"] in seen:
                    existing_topics = set(seen[a["url"]].get("topics", []))
                    existing_topics.update(feed["topics"])
                    a["topics"] = list(existing_topics)
                  else:
                    a["topics"] = feed["topics"]
                  seen[a["url"]] = a
                print(f"  {sid} / {feed['label']}: {len(new_articles)} fetched")
              except Exception as e:
                print(f"  FAILED {sid} / {feed['label']}: {e}")

            all_articles = []
            for a in seen.values():
              d = parse_date(a.get("date", ""))
              if d is None or d >= cutoff:
                all_articles.append(a)

            all_articles.sort(key=lambda a: parse_date(a.get("date","")) or datetime.min.replace(tzinfo=timezone.utc), reverse=True)
            output[sid] = {"name": source["source"], "articles": all_articles}
            print(f"  {sid} total: {len(all_articles)}")

          with open("articles.json", "w") as f:
            json.dump(output, f)

          total = sum(len(v["articles"]) for v in output.values())
          print(f"Done. {total} total articles.")
          PYEOF

      - name: Commit articles.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.json
          git diff --cached --quiet || git commit -m "chore: refresh articles"
          git push
